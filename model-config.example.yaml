# AICmd model config template / AICmd 模型配置模板
#
# English: This is the single customer-facing template for model setup.
# Copy it to your runtime config file and edit the model/client values.
#
# 中文：这是唯一面向客户的模型配置模板。
# 复制到运行时配置文件后，修改 model/client 即可。
#
# Runtime config path / 运行时配置路径：
#   macOS: ~/Library/Application Support/aicmd/config.yaml
#   Linux: ~/.config/aicmd/config.yaml
#   Override / 显式指定: AICMD_CONFIG_DIR=/path/to/config-dir

# Select the default model / 选择默认模型
# Format / 格式: <client-name>:<model-name>
model: openai:gpt-4o

temperature: null
top_p: null

# Command workflow behavior / 命令工作流行为
save: true
wrap: no
highlight: true
save_shell_history: true

# File loaders used by `aicmd -f <file> ...`.
# `aicmd -f <文件> ...` 使用的文件加载器。
document_loaders:
  pdf: 'pdftotext $1 -'
  docx: 'pandoc --to plain $1'

# Model providers / 模型服务配置
clients:
  # OpenAI / OpenAI 示例
  - type: openai
    # name defaults to "openai" when omitted.
    # 省略 name 时默认是 "openai"。
    api_base: https://api.openai.com/v1
    api_key: sk-xxxx

  # DeepSeek / DeepSeek 示例
  - type: openai-compatible
    name: deepseek
    api_base: https://api.deepseek.com
    api_key: sk-xxxx
    models:
      - name: deepseek-chat
        max_input_tokens: 64000

  # Local OpenAI-compatible provider, such as Ollama.
  # 本地 OpenAI-compatible provider，例如 Ollama。
  - type: openai-compatible
    name: ollama
    api_base: http://localhost:11434/v1
    api_key: xxx
    models:
      - name: llama3.1
        max_input_tokens: 128000
