# AICmd focused config example / AICmd 聚焦配置示例
#
# English: This example only documents the options useful for AICmd's focused
# natural-language terminal command workflow. Provider-specific fields from the
# upstream AIChat config may still work, but broad workflows such as REPL, RAG,
# agents, macros, custom tools/functions, and server mode are not AICmd product
# workflows.
#
# 中文：这个示例只记录 AICmd 聚焦的“自然语言终端命令”工作流所需配置。
# 上游 AIChat 的部分 provider 配置字段仍可能可用，但 REPL、RAG、agents、
# macros、自定义 tools/functions、server mode 不属于 AICmd 产品工作流。

# ---- model / 模型 ----
model: openai:gpt-4o
temperature: null
top_p: null

# ---- command behavior / 命令行为 ----
save: true
wrap: no
highlight: true
save_shell_history: true

# ---- file loading / 文件加载 ----
# Used by `aicmd -f <file> ...`.
# 用于 `aicmd -f <文件> ...`。
document_loaders:
  pdf: 'pdftotext $1 -'
  docx: 'pandoc --to plain $1'

# ---- clients / 模型服务 ----
clients:
  # OpenAI example / OpenAI 示例
  - type: openai
    api_base: https://api.openai.com/v1
    api_key: xxx

  # OpenAI-compatible example, such as Ollama / OpenAI-compatible 示例，例如 Ollama
  - type: openai-compatible
    name: ollama
    api_base: http://localhost:11434/v1
    api_key: xxx
    models:
      - name: llama3.1
        max_input_tokens: 128000
