# AICmd built-in model registry / AICmd 内置模型目录
#
# English:
# This file is intentionally small. It only provides fallback chat model
# metadata for AICmd maintainers. Customers should normally configure their
# own models in runtime config.yaml, using model-config.example.yaml as the
# single customer-facing template.
#
# 中文：
# 这个文件刻意保持精简，只给 AICmd 维护者提供少量 chat 模型兜底元数据。
# 客户通常应在运行时 config.yaml 中配置自己的模型，并以
# model-config.example.yaml 作为唯一面向客户的模板。

- provider: openai
  models:
    - name: gpt-4o
      max_input_tokens: 128000
    - name: gpt-4o-mini
      max_input_tokens: 128000

- provider: deepseek
  models:
    - name: deepseek-chat
      max_input_tokens: 64000
    - name: deepseek-v4-flash
      max_input_tokens: 64000
    - name: deepseek-v4-pro
      max_input_tokens: 64000

- provider: ollama
  models:
    - name: llama3.1
      max_input_tokens: 128000
    - name: qwen2.5
      max_input_tokens: 128000

- provider: gemini
  models:
    - name: gemini-2.5-flash
      max_input_tokens: 1048576

- provider: claude
  models:
    - name: claude-3-5-sonnet-latest
      max_input_tokens: 200000
      require_max_tokens: true
